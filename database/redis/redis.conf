# Redis configuration — production-ready defaults
# ─────────────────────────────────────────────────────────────────────────────

# Network
bind 0.0.0.0
port 6379
protected-mode no

# ── Persistence ──────────────────────────────────────────────────────────────
# RDB snapshots
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
dir /data

# AOF (append-only file) for higher durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Memory ───────────────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
