name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven (skip tests)
        working-directory: backend/java-spring-api
        run: mvn package -DskipTests -q

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        working-directory: backend/java-spring-api
        run: mvn test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/java-spring-api/target/surefire-reports/

  frontend-lint:
    name: Lint & Format Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/react-app/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: frontend/react-app
        run: npm ci

      - name: Run ESLint
        working-directory: frontend/react-app
        run: npm run lint

      - name: Check Prettier formatting
        working-directory: frontend/react-app
        run: npx prettier --check 'src/**/*.{js,jsx,css}'

  build-containers:
    name: Build Containers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update -q
          sudo apt-get install -y podman

      - name: Build backend container
        run: podman build -t app-backend:ci backend/java-spring-api

      - name: Build frontend container
        run: podman build -t app-frontend:ci frontend/react-app

      - name: Build redis container
        run: podman build -t app-redis:ci database/redis

      - name: Validate podman-compose config
        run: |
          pip install podman-compose --quiet
          cd containers && podman-compose config

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [backend-build, unit-tests, frontend-lint, build-containers]
    if: always()
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BACKEND_RESULT: ${{ needs.backend-build.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
          LINT_RESULT: ${{ needs.frontend-lint.result }}
          CONTAINERS_RESULT: ${{ needs.build-containers.result }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          if [[ "$BACKEND_RESULT" == "success" && \
                "$TEST_RESULT" == "success" && \
                "$LINT_RESULT" == "success" && \
                "$CONTAINERS_RESULT" == "success" ]]; then
            COLOR=3066993
            TITLE="CI Pipeline — Passed"
          else
            COLOR=15158332
            TITLE="CI Pipeline — Failed"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"$BRANCH\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"${COMMIT:0:7}\", \"inline\": true},
                  {\"name\": \"Backend Build\", \"value\": \"$BACKEND_RESULT\", \"inline\": true},
                  {\"name\": \"Unit Tests\", \"value\": \"$TEST_RESULT\", \"inline\": true},
                  {\"name\": \"Frontend Lint\", \"value\": \"$LINT_RESULT\", \"inline\": true},
                  {\"name\": \"Container Build\", \"value\": \"$CONTAINERS_RESULT\", \"inline\": true}
                ]
              }]
            }"
